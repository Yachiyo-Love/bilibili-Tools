name: release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Package binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $exe = Get-ChildItem target/release -Filter *.exe | Where-Object { $_.Name -notlike "*.pdb" } | Select-Object -First 1
          if (-not $exe) { throw "No release executable found." }
          Copy-Item $exe.FullName dist/
          Compress-Archive -Path dist/* -DestinationPath "bilibili-tools-windows.zip" -Force

      - name: Create Main Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-main
          name: Main Build
          prerelease: true
          make_latest: false
          files: bilibili-tools-windows.zip

      - name: Create Tag Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bilibili-tools-windows.zip
